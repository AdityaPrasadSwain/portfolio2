<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Aditya Prasad Swain — Java Full Stack Developer specializing in Spring Boot, React.js, and PostgreSQL. Building scalable, secure web applications." />
    <title>Aditya Prasad Swain | Java Full Stack Developer</title>
    <style>
      body {
        margin: 0;
        background: linear-gradient(135deg, #f3e8ff 0%, #fce7f3 30%, #ede9fe 60%, #ddd6fe 100%);
      }
      .initial-loader {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
        width: 100vw;
        background: linear-gradient(135deg, #f3e8ff 0%, #fce7f3 30%, #ede9fe 60%, #ddd6fe 100%);
      }
      .loader-orbit {
        position: relative;
        width: 64px;
        height: 64px;
        border-radius: 50%;
        perspective: 800px;
        margin-bottom: 30px;
      }
      .loader-orbit .inner {
        position: absolute;
        box-sizing: border-box;
        width: 100%;
        height: 100%;
        border-radius: 50%;
      }
      .loader-orbit .inner.one {
        left: 0%;
        top: 0%;
        animation: rotate-one 1.2s linear infinite;
        border-bottom: 3px solid #EC4899;
      }
      .loader-orbit .inner.two {
        right: 0%;
        top: 0%;
        animation: rotate-two 1.2s linear infinite;
        border-right: 3px solid #8B5CF6;
      }
      .loader-orbit .inner.three {
        right: 0%;
        bottom: 0%;
        animation: rotate-three 1.2s linear infinite;
        border-top: 3px solid #6366F1;
      }
      @keyframes rotate-one {
        0% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(0deg); }
        100% { transform: rotateX(35deg) rotateY(-45deg) rotateZ(360deg); }
      }
      @keyframes rotate-two {
        0% { transform: rotateX(50deg) rotateY(10deg) rotateZ(0deg); }
        100% { transform: rotateX(50deg) rotateY(10deg) rotateZ(360deg); }
      }
      @keyframes rotate-three {
        0% { transform: rotateX(35deg) rotateY(55deg) rotateZ(0deg); }
        100% { transform: rotateX(35deg) rotateY(55deg) rotateZ(360deg); }
      }
      .loader-text {
        font-family: 'Poppins', sans-serif, system-ui;
        color: #3B0764;
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 4px;
        animation: pulse 1.5s infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="loader-orbit">
          <div class="inner one"></div>
          <div class="inner two"></div>
          <div class="inner three"></div>
        </div>
        <div class="loader-text">Loading...</div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>

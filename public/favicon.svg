<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1E1B4B;stop-opacity:1" /> <!-- Very dark purple -->
      <stop offset="100%" style="stop-color:#09090B;stop-opacity:1" /> <!-- Near black -->
    </linearGradient>

    <!-- Vibrant Purple to Pink Gradient -->
    <linearGradient id="logoGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#EC4899;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:1" />
    </linearGradient>

    <!-- Bright Core Gradient -->
    <linearGradient id="logoGradLight" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FBCFE8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C4B5FD;stop-opacity:1" />
    </linearGradient>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="2" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect width="120" height="120" rx="28" fill="url(#bgGrad)" />
  
  <!-- Subtle inner border -->
  <rect width="104" height="104" x="8" y="8" rx="20" fill="none" stroke="url(#logoGrad)" stroke-width="2" opacity="0.3" />

  <!-- Code Brackets Background -->
  <path d="M 38 35 L 18 60 L 38 85" fill="none" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" opacity="0.4"/>
  <path d="M 82 35 L 102 60 L 82 85" fill="none" stroke="url(#logoGrad)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round" filter="url(#shadow)" opacity="0.4"/>

  <!-- Stylized Monogram "A" with glowing effect -->
  <g filter="url(#glow)">
    <path d="M 60 26 L 36 86 M 60 26 L 84 86 M 44 64 L 76 64" fill="none" stroke="url(#logoGrad)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
  
  <!-- Bright Core for Monogram -->
  <path d="M 60 26 L 36 86 M 60 26 L 84 86 M 44 64 L 76 64" fill="none" stroke="url(#logoGradLight)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" />
</svg>